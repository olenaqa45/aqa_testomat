          schema:
            type: string
      responses:
        "200":
          description: Paginated list of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
    post:
      summary: Create a plan
      operationId: createPlan

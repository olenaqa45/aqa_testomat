  /api/v2/{project_id}/sessions:
    post:
      summary: Start a session
      operationId: createSession
      tags:
        - Sessions
      description: |
        Creates a new session that groups subsequent API changes under a single
        history entry. Pass the returned hash in the X-Session-Hash header on
        subsequent requests. Sessions expire after 30 minutes.
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Optional description shown in project history
      responses:
        "201":
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      hash:
                        type: string
                        description: Session hash to pass in X-Session-Hash header
                      version_id:
                        type: string
                        description: Parent version ID for reviewing and reverting session changes
                      description:
                        type: string
                      expires_in:
                        type: integer
                        description: Session TTL in seconds
                      created_at:
                        type: string
                        format: date-time
  /api/v2/{project_id}/sessions/{id}:
    delete:
      summary: Stop a session
      operationId: deleteSession
      tags:
        - Sessions
      description: |
        Stops an active session and removes it from the server.
        Subsequent requests with this session hash will be rejected.
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: id
          in: path
          required: true
          description: Session hash
          schema:
            type: string
      responses:
        "204":
          description: Session stopped
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v2/{project_id}/analytics/tests/{kind}:
    get:
      summary: List tests matching an analytics report
      operationId: analyticsTests
      tags:
        - Analytics
      description: >
        Returns a paginated list of tests for the given analytics `kind`:

        `flaky`, `slow`, `failing`, `evergreen`, `never-executed`, `skipped`,

        `failures`, `defects`, or `issues`. Row shape varies per kind; see

        the `AnalyticsTestsResponse` schema.


        Filter with `q` (TQL), `days` or `from`/`to`, and `envs`. Kind-specific

        params: `min`/`max` (flaky, 0.0–1.0), `threshold_ms` (slow),

        `maturity_days` (never-executed), `run` (flaky/slow — scope to one run
        UID).
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/analyticsTestKind"
        - $ref: "#/components/parameters/analyticsQ"
        - $ref: "#/components/parameters/analyticsDays"
        - $ref: "#/components/parameters/analyticsFrom"
        - $ref: "#/components/parameters/analyticsTo"
        - $ref: "#/components/parameters/analyticsEnvs"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: min
          in: query
          required: false
          description: Flaky rate lower bound (0.0–1.0). Applies only to `flaky`.
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: max
          in: query
          required: false
          description: Flaky rate upper bound (0.0–1.0). Applies only to `flaky`.
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: threshold_ms
          in: query
          required: false
          description: Duration threshold in milliseconds. Applies only to `slow`.
          schema:
            type: integer
            minimum: 11
        - name: maturity_days
          in: query
          required: false
          description: Minimum test age in days. Applies only to `never-executed`.
          schema:
            type: integer
            minimum: 0
        - name: run
          in: query
          required: false
          description: Scope results to one run UID. Applies only to `flaky` and `slow`.
          schema:
            type: string
      responses:
        "200":
          description: Matching tests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsTestsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v2/{project_id}/analytics/stats/{kind}:
    get:
      summary: Fetch an aggregated analytics report
      operationId: analyticsStats
      tags:
        - Analytics
      description: |
        Returns aggregated data for the given stats `kind`:
        `project-summary`, `runs-summary`, `success-rate-by-date`,
        `automation-rate-by-date`, `testruns-by-date`, or `priority-by-date`.

        Response shape is generic — `meta.primary_key`, `meta.primary_label`,
        and `meta.data_keys` describe the rows so clients can render charts
        without hardcoded per-kind schemas.
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/analyticsStatsKind"
        - $ref: "#/components/parameters/analyticsQ"
        - $ref: "#/components/parameters/analyticsDays"
        - $ref: "#/components/parameters/analyticsFrom"
        - $ref: "#/components/parameters/analyticsTo"
        - $ref: "#/components/parameters/analyticsEnvs"
      responses:
        "200":
          description: Aggregated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsStatsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

openapi: 3.1.0
info:
  title: Testomat.io Public api v2
  version: 2.0.0
  description: |
    Public API v2 for managing test management resources in Testomat.io.
    All endpoints require Bearer token authentication and a project ID path parameter.

    > [!WARNING] This is **Testomat.io Public API v2**. If you are here for the API v1, see [Legacy API](/docs/openapi) reference.

    > [!NOTE] Importing API (1.0.0) is available at <a href="https://testomatio.github.io/check-tests">testomatio.github.io/check-tests</a> repo

    > [!NOTE] Reporting API (1.0.0) is available at <a href="https://testomatio.github.io/reporter">testomatio.github.io/reporter</a> repo

    > [!NOTE] **MCP Server** Reference is available at <a href="https://github.com/testomatio/mcp">MCP Server Repository on GitHub</a>
servers:
  - url: https://app.testomat.io
security:
  - bearerAuth: [ ]
tags:
  - name: Tests
    description: Manage test cases
  - name: Suites
    description: Manage test suites (folders)
  - name: Plans
    description: Manage test plans
  - name: Runs
    description: Manage test runs
  - name: Testruns
    description: Manage individual test results within runs
  - name: Rungroups
    description: Manage run groups (environments/configurations)
  - name: Steps
    description: Manage reusable test steps
  - name: Snippets
    description: Manage reusable step snippets
  - name: Labels
    description: Manage labels and custom fields
  - name: Tags
    description: Browse tags and tagged tests
  - name: Milestones
    description: Browse milestones visible to the project
  - name: Issues
    description: Manage linked issues (generic and Jira)
  - name: Requirements
    description: Browse requirements linked to the project
  - name: Sessions
    description: Group multiple api changes under a single history entry
  - name: Analytics
    description: |
      Analytics endpoints return either lists of tests matching a criterion
      (`/analytics/tests/{kind}`) or aggregated stats
      (`/analytics/stats/{kind}`). Both families accept a common filter set:
      optional TQL `q`, time window (`days` or `from`/`to`), and execution
      environments `envs`. Requires the `api_analytics` subscription feature.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: api token from Testomat.io project settings
  parameters:
    projectId:
      name: project_id
      in: path
      required: true
      description: Project slug identifier
      schema:
        type: string
    resourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      description: Page number (minimum 1)
      schema:
        type: integer
        minimum: 1
        default: 1
    perPage:
      name: per_page
      in: query
      description: Items per page (1-100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    sessionHash:
      name: X-Session-Hash
      in: header
      required: false
      description: |
        Session hash returned by POST /sessions. When present, all changes
        made in this request are grouped under the session's parent version
        in project history.
      schema:
        type: string
    analyticsTestKind:
      name: kind
      in: path
      required: true
      description: Test-level analytics report
      schema:
        type: string
        enum:
          - flaky
          - slow
          - failing
          - evergreen
          - never-executed
          - skipped
          - failures
          - defects
          - issues
    analyticsStatsKind:
      name: kind
      in: path
      required: true
      description: Aggregated analytics report
      schema:
        type: string
        enum:
          - project-summary
          - runs-summary
          - success-rate-by-date
          - automation-rate-by-date
          - testruns-by-date
          - priority-by-date
    analyticsQ:
      name: q
      in: query
      required: false
      description: |
        TQL (Testomat.io Query Language) filter for tests, e.g.
        `priority == 'high' AND tag IN ['@smoke']`. Resolved to matching
        test IDs and applied to both test-level and stats reports.
      schema:
        type: string
    analyticsDays:
      name: days
      in: query
      required: false
      description: Lookback window in days (default 30). Ignored when `from`/`to` are
        provided.
      schema:
        type: integer
        minimum: 1
        default: 30
    analyticsFrom:
      name: from
      in: query
      required: false
      description: Inclusive start date (YYYY-MM-DD). Takes precedence over `days`.
      schema:
        type: string
        format: date
    analyticsTo:
      name: to
      in: query
      required: false
      description: Inclusive end date (YYYY-MM-DD).
      schema:
        type: string
        format: date
    analyticsEnvs:
      name: envs
      in: query
      required: false
      description: Comma-separated execution environments (e.g. `staging,production`).
      schema:
        type: string
  schemas:
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    AnalyticsTestsResponse:
      type: object
      properties:
        data:
          type: array
          description: >
            Rows of tests matching the kind. Row shape varies per kind.

            Common fields: `test_uid`, `title`, `suite_uid`, `suite_title`,
            `priority`, `executed_at`.

            `flaky` adds `flaky_rate`, `runStatuses`.

            `slow` adds `run_time`, `threshold`, `testrun_id`, `run_uid`,
            `run_title`, `status`.

            `failures` groups by error message.

            `issues` / `defects` group by linked JIRA issue.
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        config:
          type: object
          description: Query configuration in effect (e.g. `min`/`max` for flaky,
            `threshold` for slow).
          additionalProperties: true
        filter_values:
          type: object
          additionalProperties: true
    AnalyticsStatsResponse:
      type: object
      properties:
        data:
          type: array
          description: >
            Aggregated rows. Shape depends on the stats kind (see
            `meta.data_keys`).

            `project-summary` and `runs-summary` return one row per project/run
            with 20+ fields.

            `*-by-date` kinds return one row per day keyed by `date`.
          items:
            type: object
            additionalProperties: true
        meta:
          type: object
          properties:
            kind:
              type: string
            primary_key:
              type: string
              nullable: true
            primary_label:
              type: string
              nullable: true
            data_keys:
              type: array
              items:
                type: string
            is_empty:
              type: boolean
        filter_values:
          type: object
          additionalProperties: true
    Test:
      type: object
      properties:
        id:
          type: string
          description: Public UID (e.g. "@Txxxxx")
        type:
          type: string
          enum:
            - test
        title:
          type: string
        emoji:
          type:
            - string
            - "null"
        state:
          type:
            - string
            - "null"
        is_shared:
          type: boolean
        assigned_to:
          type:
            - string
            - "null"
          format: email
        priority:
          type:
            - string
            - "null"
          enum:
            - low
            - normal
            - important
            - high
            - critical
            - null
        public_title:
          type: string
        clean_title:
          type: string
        self_tags:
          type: array
          items:
            type: string
        sync:
          type:
            - boolean
            - "null"
        code:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
        position:
          type:
            - integer
            - "null"
        suite_id:
          type:
            - string
            - "null"
          description: Public UID of the parent suite
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelAttachment"
    Suite:
      type: object
      properties:
        id:
          type: string
          description: Public UID
        type:
          type: string
          enum:
            - suite
        title:
          type: string
        emoji:
          type:
            - string
            - "null"
        public_title:
          type: string
        is_shared:
          type: boolean
        file_type:
          type:
            - string
            - "null"
          description: "Auto-detected: 'folder' if suite has children, 'file' otherwise"
        test_count:
          type: integer
        assigned_to:
          type:
            - string
            - "null"
          format: email
        clean_title:
          type: string
        tags:
          type: array
          items:
            type: string
        sync:
          type:
            - boolean
            - "null"
        description:
          type:
            - string
            - "null"
        file:
          type:
            - string
            - "null"
          description: File path associated with this suite
        parent_id:
          type:
            - string
            - "null"
          description: Public UID of the parent suite, or null for root suites
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelAttachment"
        requirements:
          type: array
          description: Attached and global requirements for this suite
          items:
            $ref: "#/components/schemas/LinkedRequirement"
        children:
          type: array
          description: Nested child suites (present in tree responses when children exist)
          items:
            $ref: "#/components/schemas/Suite"
    LinkedRequirement:
      type: object
      properties:
        id:
          type: string
          description: ID (8-char)
        title:
          type: string
        source_type:
          type: string
          enum:
            - jira
            - confluence
            - file
            - text
        global:
          type: boolean
          description: True if this is a global (project-level) requirement
    Requirement:
      type: object
      properties:
        id:
          type: string
          description: Public ID (8-char)
        type:
          type: string
          enum:
            - requirement
        title:
          type: string
        description:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
          description: Extended details or raw content of the requirement
        message:
          type: string
          nullable: true
          description: Processing message or error details
        source_type:
          type: string
          enum:
            - jira
            - confluence
            - file
            - text
        source_key:
          type: string
        status:
          type: string
          enum:
            - pending
            - processed
            - failed
            - outdated
        active:
          type: boolean
        global:
          type: boolean
        level:
          type: string
          enum:
            - project
            - suite
            - none
          description: Scope level of the requirement
    RequirementCreateInput:
      type: object
      required:
        - title
        - source_type
      properties:
        title:
          type: string
        source_type:
          type: string
          enum:
            - jira
            - confluence
            - file
            - text
        description:
          type: string
          description: Required for text requirements. Must be at least 500 characters.
        details:
          type: string
          nullable: true
        active:
          type: boolean
        global:
          type: boolean
        confluence_url:
          type: string
          description: Required for confluence requirements
        files:
          type: array
          items:
            type: string
            format: binary
          description: "Files to attach to the requirement. Allowed extensions: pdf, doc,
            docx, xls, xlsx, csv, txt, md, html, xml, json, feature, png, jpg,
            jpeg, gif, svg, webp"
    RequirementUpdateInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          description: Only applied for text requirements
        details:
          type: string
          nullable: true
        active:
          type: boolean
        global:
          type: boolean
        files:
          type: array
          items:
            type: string
            format: binary
          description: "Files to attach to the requirement. Allowed extensions: pdf, doc,
            docx, xls, xlsx, csv, txt, md, html, xml, json, feature, png, jpg,
            jpeg, gif, svg, webp"
    Plan:
      type: object
      properties:
        id:
          type: string
          description: Public UID
        type:
          type: string
          enum:
            - plan
        title:
          type: string
        description:
          type: string
          nullable: true
        kind:
          type: string
          enum:
            - manual
            - automated
            - mixed
          description: Plan type
        hidden:
          type: boolean
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelAttachment"
    Run:
      type: object
      properties:
        id:
          type: string
          description: Public UID
        type:
          type: string
          enum:
            - run
        clean_title:
          type: string
        kind:
          type: string
          enum:
            - manual
            - automated
            - mixed
          description: Run type
        rungroup_id:
          type:
            - string
            - "null"
          description: Public UID of the rungroup this run belongs to
        plan_id:
          type:
            - string
            - "null"
          description: Public UID of the plan this run created from
        assigned_to:
          type:
            - string
            - "null"
          format: email
        assign_strategy:
          type: string
          enum:
            - test
            - random
            - none
        env:
          type:
            - string
            - "null"
          description: Environment(s) for this run, comma-separated
        description:
          type:
            - string
            - "null"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelAttachment"
    Testrun:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
            - testrun
        test_title:
          type:
            - string
            - "null"
        message:
          type:
            - string
            - "null"
        status:
          type:
            - string
            - "null"
          description: "One of: passed, failed, skipped, pending"
        substatus:
          type:
            - string
            - "null"
        run_time:
          type:
            - integer
            - "null"
          description: Test execution duration in milliseconds
        automated:
          type: boolean
        assigned_to:
          type:
            - string
            - "null"
          format: email
        run_id:
          type:
            - string
            - "null"
          description: Public UID of the parent run
        test_id:
          type:
            - string
            - "null"
          description: Public UID of the associated test
    Rungroup:
      type: object
      properties:
        id:
          type: string
          description: Public UID
        type:
          type: string
          enum:
            - rungroup
        clean_title:
          type: string
        emoji:
          type:
            - string
            - "null"
        description:
          type:
            - string
            - "null"
        kind:
          type:
            - string
            - "null"
        status:
          type:
            - string
            - "null"
        pin:
          type:
            - boolean
            - "null"
        runs_count:
          type: integer
        finished_at:
          type:
            - string
            - "null"
          format: date-time
        tests_count:
          type: integer
        archived_at:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type: string
          format: date-time
        parent_id:
          type:
            - string
            - "null"
          description: Public UID of the parent run group
        children:
          type: array
          description: Nested child run groups (present in tree responses when children
            exist)
          items:
            $ref: "#/components/schemas/Rungroup"
    Step:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum:
            - step
        title:
          type: string
        description:
          type:
            - string
            - "null"
        is_snippet:
          type: boolean
        kind:
          type:
            - string
            - "null"
        usage_count:
          type: integer
        keywords:
          type:
            - array
            - "null"
          items:
            type: string
        labels:
          type: array
          items:
            $ref: "#/components/schemas/LabelAttachment"
    Label:
      type: object
      properties:
        id:
          type: string
          description: Label slug
        title:
          type: string
        color:
          type:
            - string
            - "null"
        position:
          type: integer
        visibility:
          type: string
        list:
          type: boolean
    TagSummary:
      type: object
      properties:
        title:
          type: string
        count:
          type: integer
    Issue:
      type: object
      properties:
        id:
          type: integer
          description: Database ID
        type:
          type: string
          enum:
            - issue
            - jira_issue
        title:
          type: string
        url:
          type:
            - string
            - "null"
        source:
          type: string
          description: Integration source (e.g. github, jira, linear, link)
        resource_type:
          type: string
          description: Type of linked resource (test, suite, run, testrun, plan)
        resource_id:
          type: string
          description: Public UID of the linked resource
        jira_id:
          type:
            - string
            - "null"
          description: Jira issue key (only for type=jira_issue)
        synced:
          type:
            - boolean
            - "null"
          description: Jira sync status (only for type=jira_issue)
    LabelAttachment:
      type: object
      properties:
        id:
          type: string
          description: Label slug
        title:
          type: string
        color:
          type:
            - string
            - "null"
        position:
          type: integer
        visibility:
          type: string
        list:
          type: boolean
        value:
          type:
            - string
            - "null"
          description: Custom field value (if label has a field type)
        short:
          type:
            - string
            - "null"
          description: Short display format for the field
    LinkAction:
      type: object
      required:
        - action
        - type
      properties:
        action:
          type: string
          enum:
            - add
            - remove
        type:
          type: string
          enum:
            - label
            - custom_field
            - tag
            - milestone
            - issue
            - jira
            - requirement
        value:
          type: string
          description: |
            Meaning depends on type:
            - label/custom_field: label slug, or "Slug:Value" colon notation
            - tag: tag name
            - milestone: milestone slug
            - issue: issue URL
            - jira: Jira issue key (e.g. TST-123)
            - requirement: requirement ID (8-char). Only supported for suites.
    Milestone:
      type: object
      properties:
        id:
          type: string
          description: Milestone slug
        type:
          type: string
          enum:
            - milestone
        title:
          type: string
        value:
          type: string
        display_title:
          type: string
        status:
          type: string
          enum:
            - created
            - active
            - closed
        description:
          type:
            - string
            - "null"
        goal:
          type:
            - string
            - "null"
        start_date:
          type:
            - string
            - "null"
          format: date
        release_date:
          type:
            - string
            - "null"
          format: date
        url:
          type:
            - string
            - "null"
        expired:
          type: boolean
        project_scoped:
          type: boolean
    IssueInput:
      type: object
      properties:
        url:
          type: string
          description: Issue URL (for generic issues). Provide either url or jira_id.
        jira_id:
          type: string
          description: Jira issue key (e.g. TST-123). Provide either url or jira_id.
    TestInput:
      type: object
      required:
        - title
        - suite_id
      properties:
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        suite_id:
          type: string
          description: Public UID of the parent suite
        priority:
          type: string
          enum:
            - low
            - normal
            - important
            - high
            - critical
        assigned_to:
          type: string
          format: email
          description: Email address of a non-readonly project member to assign.
        code:
          type: string
        state:
          type: string
        link:
          type: array
          description: Add/remove labels, tags, issues, or jira links
          items:
            $ref: "#/components/schemas/LinkAction"
    SuiteInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        parent_id:
          type: string
          description: Public UID of the parent suite
        file_type:
          type: string
          description: "Auto-detected from children: 'folder' if children provided, 'file'
            otherwise. Can be overridden explicitly."
        assigned_to:
          type: string
          format: email
          description: Email address of a non-readonly project member to assign.
        file:
          type: string
          description: File path to associate with the suite. Only applicable when
            file_type is 'file'.
        children:
          type: array
          description: Nested child suites to create recursively. When provided, file_type
            is auto-set to 'folder'.
          items:
            $ref: "#/components/schemas/SuiteChildInput"
        link:
          type: array
          description: Add/remove labels, tags, issues, or jira links
          items:
            $ref: "#/components/schemas/LinkAction"
    SuiteChildInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        children:
          type: array
          description: Nested child suites (recursive)
          items:
            $ref: "#/components/schemas/SuiteChildInput"
    PlanInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        kind:
          type: string
        hidden:
          type: boolean
        as_manual:
          type: boolean
        test_ids:
          type: array
          description: List of test IDs (8-char) to include in the plan. If omitted, all
            tests matching the plan kind are included.
          items:
            type: string
        suite_ids:
          type: array
          description: List of suite IDs (8-char) to include in the plan. If omitted, all
            suites are considered.
          items:
            type: string
        link:
          type: array
          description: Add/remove labels or issues/jira links
          items:
            $ref: "#/components/schemas/LinkAction"
    RunCreateInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        plan_ids:
          type: array
          description: List of plan public UIDs to include in the run
          items:
            type: string
        kind:
          type: string
          enum:
            - manual
            - automated
            - mixed
        rungroup_id:
          type: string
          description: Public UID of the run group
        env:
          type: string
          description: Environment(s) for this run, comma-separated
        assigned_to:
          type: string
          format: email
          description: Email address of a non-readonly project member to assign.
        assign_strategy:
          type: string
          enum:
            - test
            - random
            - none
          description: >
            Strategy for assigning testruns to users:

            - `test`: assign each testrun to the user assigned to the
            corresponding test

            - `random`: distribute testruns evenly across all run assistants

            - `none`: no automatic assignment (default)
        test_ids:
          type: array
          description: List of test public UIDs to include in the run. Pass ["*"] to
            include all tests in the project.
          items:
            type: string
        suite_ids:
          type: array
          description: List of suite public UIDs whose tests will be included in the run
          items:
            type: string
        envs:
          type: array
          description: >
            List of environments for multi-environment run creation. Only
            applicable when `kind` is `manual` (or not specified). When
            provided, a separate Run is created for each environment and grouped
            into a Rungroup. Ignored for `automated` and `mixed` kinds.
          items:
            type: string
          example:
            - staging
            - production
        link:
          type: array
          description: Add/remove labels or issues/jira links
          items:
            $ref: "#/components/schemas/LinkAction"
    RunUpdateInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        kind:
          type: string
          enum:
            - manual
            - automated
            - mixed
        rungroup_id:
          type: string
          description: Public UID of the run group
        env:
          type: string
          description: Environment(s) for this run, comma-separated
        status_event:
          type: string
          enum:
            - finish
            - finish_manual
            - launch
            - rerun
            - scheduled
            - terminate
          description: >
            Trigger a run status transition:

            - `finish`: Finish an automated run; final status is calculated from
            test results

            - `finish_manual`: Finish a manual/mixed run; final status is
            calculated from test results

            - `launch`: Start the run

            - `rerun`: Restart the run

            - `scheduled`: Move the run back to scheduled state

            - `terminate`: Stop the run and mark it as terminated
        assigned_to:
          type: string
          format: email
          description: Email address of a non-readonly project member to assign.
        assign_strategy:
          type: string
          enum:
            - test
            - random
            - none
          description: >
            Strategy for assigning testruns to users:

            - `test`: assign each testrun to the user assigned to the
            corresponding test

            - `random`: distribute testruns evenly across all run assistants

            - `none`: no automatic assignment (default)
        test_ids:
          type: array
          description: List of test public UIDs to append to the run configuration
          items:
            type: string
        suite_ids:
          type: array
          description: List of suite public UIDs whose tests will be appended to the run
            configuration
          items:
            type: string
        link:
          type: array
          description: Add/remove labels or issues/jira links
          items:
            $ref: "#/components/schemas/LinkAction"
    TestrunInput:
      type: object
      required:
        - run_id
      properties:
        run_id:
          type: string
          description: Public UID of the run
        test_id:
          type: string
          description: Public UID of the test
        status:
          type: string
          description: "One of: passed, failed, skipped, pending"
        message:
          type: string
        run_time:
          type: number
        assigned_to:
          type: string
          format: email
          description: Email address of a non-readonly project member to assign.
        test_title:
          type: string
        automated:
          type: boolean
    RungroupInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        kind:
          type: string
        pin:
          type: boolean
        status:
          type: string
        parent_id:
          type: string
          description: Public UID of the parent run group
        children:
          type: array
          description: Nested child run groups to create recursively
          items:
            $ref: "#/components/schemas/RungroupChildInput"
    RungroupChildInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        emoji:
          type: string
        kind:
          type: string
        pin:
          type: boolean
        status:
          type: string
        children:
          type: array
          description: Nested child run groups (recursive)
          items:
            $ref: "#/components/schemas/RungroupChildInput"
    StepInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        link:
          type: array
          description: Add/remove labels
          items:
            $ref: "#/components/schemas/LinkAction"
    SnippetInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        link:
          type: array
          description: Add/remove labels
          items:
            $ref: "#/components/schemas/LinkAction"
    LabelInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        color:
          type: string
        visibility:
          type: array
          description: "Where the label appears: 'filter' — in filter panel, 'list' — on
            entity list page"
          items:
            type: string
            enum:
              - filter
              - list
        scope:
          type: array
          items:
            type: string
            enum:
              - tests
              - suites
              - runs
              - plans
              - steps
              - templates
        field:
          type: object
          additionalProperties: true
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  /api/v2/{project_id}/tests:
    get:
      summary: List tests
      operationId: listTests
      tags:
        - Tests
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: suites[]
          in: query
          description: "Filter by suite public UIDs. Returns tests from matching suites
            and their sub-suites. Pass multiple values as repeated params:
            `suites[]=id1&suites[]=id2`."
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: tags[]
          in: query
          description: "Filter by tags (OR logic — tests that have any of the specified
            tags). Use `@` prefix or plain name. Pass multiple values as
            repeated params: `tags[]=smoke&tags[]=regression`."
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: user
          in: query
          description: Filter by assigned user ID.
          schema:
            type: integer
        - name: labels[]
          in: query
          description: "Filter by labels (OR logic — tests that have any of the specified
            labels). Pass multiple values as repeated params:
            `labels[]=id1&labels[]=id2`."
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: priority
          in: query
          description: Filter by priority.
          schema:
            type: string
            enum:
              - low
              - normal
              - important
              - high
              - critical
        - name: state
          in: query
          description: Filter by automation state.
          schema:
            type: string
            enum:
              - manual
              - automated
        - name: sync_status
          in: query
          description: Filter by sync status. `sync` returns synced tests; `unsync`
            returns unsynced tests.
          schema:
            type: string
            enum:
              - sync
              - unsync
        - name: milestones[]
          in: query
          description: "Filter by milestones. Pass multiple values as repeated params:
            `milestones[]=slug1&milestones[]=slug2`."
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: search_text
          in: query
          description: Plain text search across test titles.
          schema:
            type: string
        - name: tql
          in: query
          description: TQL (Testomat Query Language) expression for advanced filtering
            (e.g. `@smoke and not @skip`). Do not prefix with `=`.
          schema:
            type: string
        - name: wildcard_tag
          in: query
          description: Filter by tag prefix using wildcard matching (e.g. `feature`
            matches `feature:login`, `feature:signup`).
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of tests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Test"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create a test
      operationId: createTest
      tags:
        - Tests
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/sessionHash"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestInput"
      responses:
        "201":
          description: Test created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Test"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v2/{project_id}/tests/{id}:
    get:
      summary: Get a test
      operationId: getTest
      tags:
        - Tests
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Test details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Test"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a test
      operationId: updateTest
      tags:
        - Tests
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/sessionHash"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestInput"
      responses:
        "200":
          description: Test updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Test"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete a test
      operationId: deleteTest
      tags:
        - Tests
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/sessionHash"
      responses:
        "204":
          description: Test deleted
  /api/v2/{project_id}/suites:
    get:
      summary: List suites as tree
      operationId: listSuites
      tags:
        - Suites
      description: >
        Returns suites as a nested tree structure. Root suites are paginated,
        with all their children nested recursively.

        When filter parameters are provided, returns only matching suites with
        their ancestor paths reconstructed as a tree (no pagination).
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: file_type
          in: query
          schema:
            type: string
            enum:
              - file
              - folder
          description: Filter suites by file type
        - name: tag
          in: query
          schema:
            type: string
          description: Filter suites by tag
        - name: labels
          in: query
          schema:
            type: string
          description: Filter suites by label (supports label:value format)
        - name: search_text
          in: query
          schema:
            type: string
          description: Search suites by title
      responses:
        "200":
          description: Tree of suites with nested children. Includes pagination meta when
            no filters are applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Suite"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
    post:
      summary: Create a suite (with optional children tree)
      operationId: createSuite
      tags:
        - Suites
      description: >
        Creates a suite. When `children` array is provided, recursively creates
        nested child suites.

        The `file_type` is auto-detected: 'folder' for suites with children,
        'file' for leaf suites.
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/sessionHash"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuiteInput"
      responses:
        "201":
          description: Suite created (with nested children if provided)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Suite"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v2/{project_id}/suites/{id}:
    get:
      summary: Get a suite
      operationId: getSuite
      tags:
        - Suites
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Suite details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Suite"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a suite
      operationId: updateSuite
      tags:
        - Suites
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/sessionHash"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuiteInput"
      responses:
        "200":
          description: Suite updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Suite"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      summary: Delete a suite
      operationId: deleteSuite
      tags:
        - Suites
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/sessionHash"
      responses:
        "204":
          description: Suite deleted

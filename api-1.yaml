        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/sessionHash"
      responses:
        "204":
          description: Run deleted
  /api/v2/{project_id}/testruns:
    get:
      summary: List testruns
      operationId: listTestruns
      tags:
        - Testruns
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: run_id
          in: query
          description: Filter by run public ID.
          schema:
            type: string
        - name: test_ids
          in: query
          description: Filter by test IDs (comma-separated, e.g. `23Eer32Re,654Ijre3`).
          schema:
            type: string
        - name: filter[status]
          in: query
          description: Filter by testrun status.
          schema:
            type: string
            enum:
              - passed
              - failed
              - skipped
              - pending
        - name: filter[kind]
          in: query
          description: Filter by automation kind.
          schema:
            type: string
            enum:
              - manual
              - automated
        - name: filter[user]
          in: query
          description: Filter by assigned user ID.
          schema:
            type: integer
        - name: filter[priority]
          in: query
          description: Filter by test priority.
          schema:
            type: string
            enum:
              - low
              - normal
              - important
              - high
              - critical
        - name: filter[substatus]
          in: query
          description: Filter by custom substatus (pipe-separated for multiple values,
            e.g. `blocked|Known issue`).
          schema:
            type: string
        - name: filter[search]
          in: query
          description: Text search across test title.
          schema:
            type: string
        - name: filter[message]
          in: query
          description: Return only testruns that have a message.
          schema:
            type: boolean
        - name: filter[link]
          in: query
          description: Return only testruns that have a linked issue.
          schema:
            type: boolean
        - name: filter[finished_at_date_range]
          in: query
          description: Filter by date range (comma-separated ISO dates, e.g.
            `2024-01-01,2024-12-31`).
          schema:
            type: string
        - name: tags
          in: query
          description: Filter by test tags (comma-separated, e.g. `smoke,regression`).
          schema:
            type: string
        - name: labels
          in: query
          description: Filter by run labels (comma-separated, without whitespace).
          schema:
            type: string
        - name: envs
          in: query
          description: Filter by run environments (comma-separated, without whitespace).
          schema:
            type: string
        - name: rungroups
          in: query
          description: Filter by rungroup public IDs (comma-separated, without
            whitespace). Use `root` for runs without a group.
          schema:
            type: string
        - name: defects
          in: query
          description: Filter by defect presence.
          schema:
            type: string
            enum:
              - has_defects
              - without_defects
      responses:
        "200":
          description: Paginated list of testruns
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:

  /api/v2/{project_id}/runs:
    get:
      summary: List runs
      operationId: listRuns
      tags:
        - Runs
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/perPage"
        - name: search
          in: query
          description: Text search across run titles.
          schema:
            type: string
        - name: tql
          in: query
          description: TQL expression for advanced filtering.
          schema:
            type: string
        - name: groupId
          in: query
          description: Filter by rungroup public UID. Includes runs from nested rungroups.
          schema:
            type: string
        - name: jira_ids
          in: query
          description: Filter by Jira issue IDs (comma-separated, e.g. `TES-1,TES-2`).
          schema:
            type: string
        - name: filter[status]
          in: query
          description: Filter by run status (comma-separated).
          schema:
            type: string
            enum:
              - scheduled
              - running
              - passed
              - failed
              - terminated
        - name: filter[kind]
          in: query
          description: Filter by run kind (comma-separated).
          schema:
            type: string
            enum:
              - manual
              - automated
              - mixed
        - name: filter[user]
          in: query
          description: Filter by assigned user IDs (comma-separated).
          schema:
            type: string
        - name: filter[created_by]
          in: query
          description: Filter by creator user IDs (comma-separated).
